<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="分數計算器">
<meta name="theme-color" content="#d1392b">
<title>分數計算器</title>
<style>
  :root{
    --red: #d1392b;
    --red-dark: #a92b20;
    --cream: #fbf5ee;
    --card: #ffffff;
    --ink: #2b211c;
    --ink-soft: #8a7a70;
    --green: #2e8b57;
    --line: #eee0d3;
    --gold: #e0a63a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Heiti TC","Microsoft JhengHei",sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height:100vh;
    padding-bottom:40px;
  }
  .wrap{
    max-width:420px;
    margin:0 auto;
    padding:18px 16px 8px;
  }
  .top-bar{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .top-bar h1{
    font-size:20px;
    margin:0;
    letter-spacing:1px;
  }
  .top-bar .stage{
    font-size:12px;
    color:var(--ink-soft);
  }
  .tabs{
    display:flex;
    gap:8px;
    margin-bottom:16px;
    background:#f1e4d5;
    border-radius:12px;
    padding:4px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:9px 0;
    font-size:14px;
    font-weight:600;
    border-radius:9px;
    color:var(--ink-soft);
    cursor:pointer;
    user-select:none;
    transition:all .15s ease;
  }
  .tab.active{
    background:var(--red);
    color:#fff;
    box-shadow:0 2px 6px rgba(209,57,43,.35);
  }
  .card{
    background:var(--card);
    border-radius:16px;
    padding:16px;
    margin-bottom:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.04);
    border:1px solid var(--line);
  }
  .card h2{
    font-size:13px;
    color:var(--red);
    margin:0 0 12px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .row-head, .row{
    display:grid;
    grid-template-columns: 1fr 96px 72px;
    align-items:center;
    gap:8px;
  }
  .row-head{
    font-size:11px;
    color:var(--ink-soft);
    padding:0 2px 8px;
    border-bottom:1px solid var(--line);
    margin-bottom:8px;
  }
  .row{
    padding:8px 2px;
  }
  .row + .row{
    border-top:1px solid #f6ede2;
  }
  .pname{
    font-weight:700;
    font-size:15px;
  }
  .score-input{
    width:100%;
    padding:8px 10px;
    border-radius:9px;
    border:1.5px solid var(--line);
    font-size:15px;
    text-align:right;
    background:#fffefc;
    color:var(--ink);
    -webkit-appearance:none;
  }
  .score-input:focus{
    outline:none;
    border-color:var(--red);
  }
  .delta{
    text-align:right;
    font-weight:700;
    font-size:14px;
    font-variant-numeric: tabular-nums;
  }
  .pos{color:var(--green);}
  .neg{color:var(--red);}
  .zero{color:var(--ink-soft);}

  .sum-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    padding:10px 12px;
    border-radius:10px;
    background:#faf3ea;
    font-size:13px;
    font-weight:600;
  }
  .sum-bar.ok{background:#e9f5ee; color:var(--green);}
  .sum-bar.bad{background:#fbeae7; color:var(--red-dark);}
  .sum-val{font-variant-numeric: tabular-nums; font-size:15px;}

  .btn{
    display:block;
    width:100%;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
    transition:transform .08s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{
    background:var(--red);
    color:#fff;
    box-shadow:0 3px 10px rgba(209,57,43,.35);
  }
  .btn-primary:disabled{
    background:#e3cfc4;
    color:#fff;
    box-shadow:none;
    cursor:not-allowed;
  }
  .btn-ghost{
    background:transparent;
    color:var(--ink-soft);
    font-weight:500;
    font-size:13px;
    padding:8px;
  }

  .leader-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 4px;
  }
  .leader-row + .leader-row{
    border-top:1px solid #f6ede2;
  }
  .rank-badge{
    width:28px;height:28px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;
    font-size:13px;
    background:#f1e4d5;
    color:var(--ink-soft);
    flex-shrink:0;
  }
  .rank-badge.gold{background:var(--gold); color:#fff;}
  .leader-name{
    flex:1;
    font-weight:700;
    font-size:15px;
  }
  .leader-score{
    font-weight:800;
    font-size:17px;
    font-variant-numeric: tabular-nums;
  }

  .footer-actions{
    display:flex;
    gap:8px;
    margin-top:4px;
  }
  .footer-actions .btn{
    margin-top:0;
    flex:1;
    padding:11px;
    font-size:13px;
  }
  .btn-secondary{
    background:#fff;
    color:var(--red);
    border:1.5px solid var(--red);
  }
  .btn-danger-outline{
    background:#fff;
    color:var(--ink-soft);
    border:1.5px solid var(--line);
  }

  .history-item{
    padding:10px 4px;
    border-top:1px solid #f6ede2;
    font-size:12.5px;
  }
  .history-item:first-child{border-top:none;}
  .history-time{
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .history-scores{
    display:flex;
    flex-wrap:wrap;
    gap:6px 12px;
  }
  .history-scores span{
    font-variant-numeric: tabular-nums;
  }
  .empty-state{
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    padding:24px 0;
  }
  .toast{
    position:fixed;
    left:50%;
    bottom:24px;
    transform:translateX(-50%);
    background:var(--ink);
    color:#fff;
    padding:10px 18px;
    border-radius:20px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, bottom .25s ease;
    z-index:50;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    bottom:34px;
  }
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <h1>🀄 分數計算器</h1>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="input">填入分數</div>
    <div class="tab" data-tab="board">總排行榜</div>
    <div class="tab" data-tab="history">紀錄</div>
  </div>

  <!-- INPUT PANEL -->
  <div id="panel-input">
    <div class="card">
      <h2>✏️ 本次分數</h2>
      <div class="row-head">
        <span>玩家姓名</span><span style="text-align:right">本次分數</span><span style="text-align:right">目前小計</span>
      </div>
      <div id="inputRows"></div>
      <div class="sum-bar bad" id="sumBar">
        <span>總和</span><span class="sum-val" id="sumVal">0</span>
      </div>
      <button class="btn btn-primary" id="saveBtn" disabled>確認存檔（發財了！）</button>
      <button class="btn btn-ghost" id="clearRoundBtn">清除本次輸入</button>
    </div>
  </div>

  <!-- LEADERBOARD PANEL -->
  <div id="panel-board" class="hidden">
    <div class="card">
      <h2>🏆 總排行榜</h2>
      <div id="leaderList"></div>
    </div>
    <div class="footer-actions">
      <button class="btn btn-secondary" id="exportBtn">匯出 CSV</button>
      <button class="btn btn-secondary" id="importBtn">匯入 CSV</button>
    </div>
    <input type="file" id="importFileInput" accept=".csv,text/csv" class="hidden">
    <button class="btn btn-danger-outline" id="resetBtn">歸零，重新開始</button>
  </div>

  <!-- HISTORY PANEL -->
  <div id="panel-history" class="hidden">
    <div class="card">
      <h2>📜 存檔紀錄</h2>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PLAYERS = ["王員外","林大叔","葉大師","莫莉","YaYa"];
const KEY_TOTALS = "score-tracker:totals";
const KEY_HISTORY = "score-tracker:history";
const KEY_VERSION = "score-tracker:version";
const KEY_IMPORT_REV = "score-tracker:import-rev";

// ============================================================
// 每次要「校正基準點」時,改這兩個地方就好:
// 1. 把 DEFAULT_SCORES 改成你要帶入的新基準分數
// 2. 把 DEFAULT_VERSION 的數字 +1（一定要改,不然手機不會套用新基準）
// 改完重新上傳這個檔案蓋掉 GitHub 上的版本即可,
// 手機端不需要手動清除資料,重新整理網頁就會自動套用新基準。
// ============================================================
const DEFAULT_VERSION = 1;
const DEFAULT_SCORES = {
  "王員外": 0,
  "林大叔": 0,
  "葉大師": 0,
  "莫莉": 0,
  "YaYa": 0
};

let totals = {};
let history = [];
let inputs = {};

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=>t.classList.remove('show'), 1800);
}

async function loadData(){
  let storedVersion = null;
  try{ storedVersion = localStorage.getItem(KEY_VERSION); }catch(e){}
  // 沒存過版本號,或版本號跟程式碼裡的不一樣 → 代表要套用新的基準分數
  const needsNewBaseline = (storedVersion === null) || (parseInt(storedVersion, 10) !== DEFAULT_VERSION);

  if(needsNewBaseline){
    totals = { ...DEFAULT_SCORES };
    history = [];
  } else {
    try{
      const t = localStorage.getItem(KEY_TOTALS);
      totals = t ? JSON.parse(t) : { ...DEFAULT_SCORES };
    }catch(e){
      totals = { ...DEFAULT_SCORES };
    }
    try{
      const h = localStorage.getItem(KEY_HISTORY);
      history = h ? JSON.parse(h) : [];
    }catch(e){
      history = [];
    }
  }

  // 補齊萬一名單有新增玩家的情況
  PLAYERS.forEach(p=>{
    if(!(p in totals)) totals[p] = (p in DEFAULT_SCORES) ? DEFAULT_SCORES[p] : 0;
  });

  if(needsNewBaseline){
    await saveTotals();
    await saveHistory();
    localStorage.setItem(KEY_VERSION, String(DEFAULT_VERSION));
  }
}

async function saveTotals(){
  localStorage.setItem(KEY_TOTALS, JSON.stringify(totals));
}
async function saveHistory(){
  localStorage.setItem(KEY_HISTORY, JSON.stringify(history));
}

function fmt(n){
  const v = Math.round(n);
  return (v>0?'+':'') + v;
}

function renderInputRows(){
  const container = document.getElementById('inputRows');
  container.innerHTML = '';
  PLAYERS.forEach(p=>{
    if(!(p in inputs)) inputs[p] = '';
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <span class="pname">${p}</span>
      <input class="score-input" type="number" inputmode="numeric" placeholder="0" data-player="${p}" value="${inputs[p]}">
      <span class="delta" id="delta-${p}"></span>
    `;
    container.appendChild(row);
  });
  container.querySelectorAll('.score-input').forEach(el=>{
    el.addEventListener('input', onInputChange);
  });
  updateDeltasAndSum();
}

function currentSum(){
  return PLAYERS.reduce((acc,p)=> acc + (parseFloat(inputs[p]) || 0), 0);
}

function updateDeltasAndSum(){
  PLAYERS.forEach(p=>{
    const val = parseFloat(inputs[p]) || 0;
    const el = document.getElementById('delta-'+p);
    if(!el) return;
    el.textContent = val === 0 ? '+0' : fmt(val);
    el.className = 'delta ' + (val>0?'pos':val<0?'neg':'zero');
  });
  const sum = currentSum();
  const sumBar = document.getElementById('sumBar');
  const sumVal = document.getElementById('sumVal');
  sumVal.textContent = fmt(sum);
  const anyEntered = PLAYERS.some(p => inputs[p] !== '' && inputs[p] !== undefined);
  if(sum === 0 && anyEntered){
    sumBar.className = 'sum-bar ok';
  } else {
    sumBar.className = 'sum-bar bad';
  }
  document.getElementById('saveBtn').disabled = !(sum === 0 && anyEntered);
}

function onInputChange(e){
  const p = e.target.dataset.player;
  inputs[p] = e.target.value;
  updateDeltasAndSum();
}

async function handleSave(){
  const sum = currentSum();
  const anyEntered = PLAYERS.some(p => inputs[p] !== '' && inputs[p] !== undefined);
  if(sum !== 0 || !anyEntered){
    showToast('分數總和必須等於 0 才能存檔');
    return;
  }
  const roundScores = {};
  PLAYERS.forEach(p=>{
    const v = parseFloat(inputs[p]) || 0;
    roundScores[p] = v;
    totals[p] = (totals[p]||0) + v;
  });
  history.unshift({ time: new Date().toISOString(), scores: roundScores });
  await saveTotals();
  await saveHistory();
  inputs = {};
  renderInputRows();
  renderLeaderboard();
  renderHistory();
  showToast('存檔成功，發財了！🎉');
}

function clearRoundInputs(){
  inputs = {};
  renderInputRows();
}

function renderLeaderboard(){
  const list = document.getElementById('leaderList');
  const sorted = [...PLAYERS].sort((a,b)=> (totals[b]||0) - (totals[a]||0));
  list.innerHTML = '';
  sorted.forEach((p,i)=>{
    const val = totals[p] || 0;
    const row = document.createElement('div');
    row.className = 'leader-row';
    row.innerHTML = `
      <div class="rank-badge ${i===0?'gold':''}">${i+1}</div>
      <div class="leader-name">${p}</div>
      <div class="leader-score ${val>0?'pos':val<0?'neg':'zero'}">${fmt(val)}</div>
    `;
    list.appendChild(row);
  });
}

function renderHistory(){
  const list = document.getElementById('historyList');
  if(history.length === 0){
    list.innerHTML = '<div class="empty-state">還沒有任何存檔紀錄</div>';
    return;
  }
  list.innerHTML = '';
  history.forEach(entry=>{
    const d = new Date(entry.time);
    const timeStr = `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const div = document.createElement('div');
    div.className = 'history-item';
    const scoresHtml = PLAYERS.map(p=>{
      const v = entry.scores[p] || 0;
      const cls = v>0?'pos':v<0?'neg':'zero';
      return `<span>${p} <b class="${cls}">${fmt(v)}</b></span>`;
    }).join('');
    div.innerHTML = `<div class="history-time">${timeStr}</div><div class="history-scores">${scoresHtml}</div>`;
    list.appendChild(div);
  });
}

async function handleReset(){
  if(!confirm('確定要重新開始嗎？排行榜會清空，並回到目前設定的基準分數。')){
    return;
  }
  totals = { ...DEFAULT_SCORES };
  history = [];
  await saveTotals();
  await saveHistory();
  renderLeaderboard();
  renderHistory();
  showToast('已重新開始');
}

function toCSV(){
  const rows = [];
  rows.push(['時間', ...PLAYERS].join(','));
  history.slice().reverse().forEach(entry=>{
    const d = new Date(entry.time);
    const timeStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    rows.push([timeStr, ...PLAYERS.map(p=>entry.scores[p]||0)].join(','));
  });
  rows.push('');
  rows.push(['目前總計', ...PLAYERS.map(p=>totals[p]||0)].join(','));
  return rows.join('\n');
}

function handleExport(){
  const csv = toCSV();
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `分數紀錄_${Date.now()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV 已匯出');
}

// ---------- 匯入 CSV（合併舊資料） ----------
function parseImportCSV(text){
  // 去掉 BOM
  const clean = text.replace(/^\uFEFF/, '');
  const lines = clean.split(/\r?\n/).map(l=>l.trim()).filter(l=>l !== '');
  if(lines.length < 2) return { rows: [], error: 'CSV 內容是空的' };

  const header = lines[0].split(',').map(s=>s.trim());
  const timeIdx = header.indexOf('時間') !== -1 ? header.indexOf('時間') : 0;
  const playerIdx = {};
  for(const p of PLAYERS){
    const idx = header.indexOf(p);
    if(idx === -1) return { rows: [], error: `CSV 欄位裡找不到「${p}」，格式不符` };
    playerIdx[p] = idx;
  }

  const rows = [];
  for(let i=1;i<lines.length;i++){
    const cells = lines[i].split(',');
    const firstCell = (cells[0]||'').trim();
    // 跳過匯出檔尾端的「目前總計」統計列
    if(firstCell === '目前總計' || firstCell === 'TOTAL' || firstCell === '') continue;
    const time = (cells[timeIdx]||'').trim();
    const scores = {};
    PLAYERS.forEach(p=>{
      scores[p] = parseFloat(cells[playerIdx[p]]) || 0;
    });
    rows.push({ time, scores });
  }
  return { rows, error: null };
}

function rowSignature(row){
  return row.time + '|' + PLAYERS.map(p=>row.scores[p]||0).join(',');
}

function recomputeTotalsFromHistory(){
  totals = { ...DEFAULT_SCORES };
  history.forEach(entry=>{
    PLAYERS.forEach(p=>{
      totals[p] = (totals[p]||0) + (entry.scores[p]||0);
    });
  });
}

async function handleImportFile(file){
  if(!file) return;
  let text;
  try{
    text = await file.text();
  }catch(e){
    showToast('讀取檔案失敗');
    return;
  }

  const { rows, error } = parseImportCSV(text);
  if(error){
    showToast(error);
    return;
  }
  if(rows.length === 0){
    showToast('這份 CSV 沒有可匯入的紀錄');
    return;
  }

  const existingSigs = new Set(history.map(rowSignature));
  const newRows = rows.filter(r => !existingSigs.has(rowSignature(r)));
  const dupCount = rows.length - newRows.length;

  if(newRows.length === 0){
    showToast(`這 ${rows.length} 筆紀錄都已經在資料裡了，沒有新增`);
    return;
  }

  const preview = {};
  PLAYERS.forEach(p=> preview[p] = (totals[p]||0));
  newRows.forEach(r=> PLAYERS.forEach(p=> preview[p] += (r.scores[p]||0)));
  const previewText = PLAYERS.map(p=>`${p} ${fmt(preview[p])}`).join('　');

  const confirmMsg = `即將合併 ${newRows.length} 筆新紀錄` +
    (dupCount > 0 ? `（略過 ${dupCount} 筆重複）` : '') +
    `。\n\n合併後總計：\n${previewText}\n\n確定要合併嗎？`;
  if(!confirm(confirmMsg)) return;

  history = history.concat(newRows);
  recomputeTotalsFromHistory();
  await saveTotals();
  await saveHistory();

  let importRev = 0;
  try{ importRev = parseInt(localStorage.getItem(KEY_IMPORT_REV), 10) || 0; }catch(e){}
  importRev += 1;
  localStorage.setItem(KEY_IMPORT_REV, String(importRev));

  renderLeaderboard();
  renderHistory();
  showToast(`已合併 ${newRows.length} 筆紀錄（資料版本 v${importRev}）`);
}

function setupTabs(){
  const tabs = document.querySelectorAll('.tab');
  const panels = {
    input: document.getElementById('panel-input'),
    board: document.getElementById('panel-board'),
    history: document.getElementById('panel-history'),
  };
  tabs.forEach(tab=>{
    tab.addEventListener('click', ()=>{
      tabs.forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      Object.values(panels).forEach(p=>p.classList.add('hidden'));
      panels[tab.dataset.tab].classList.remove('hidden');
    });
  });
}

async function init(){
  setupTabs();
  await loadData();
  renderInputRows();
  renderLeaderboard();
  renderHistory();
  document.getElementById('saveBtn').addEventListener('click', handleSave);
  document.getElementById('clearRoundBtn').addEventListener('click', clearRoundInputs);
  document.getElementById('resetBtn').addEventListener('click', handleReset);
  document.getElementById('exportBtn').addEventListener('click', handleExport);
  document.getElementById('importBtn').addEventListener('click', ()=>{
    document.getElementById('importFileInput').click();
  });
  document.getElementById('importFileInput').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    await handleImportFile(file);
    e.target.value = ''; // 允許重複選同一個檔案
  });
}

init();
</script>
</body>
</html>
